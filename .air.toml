# Live reload configuration for Go Crypto Trading Analysis
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Command to run when files change
  cmd = "go build -o ./tmp/main cmd/api/main.go"
  
  # Binary file generated by cmd
  bin = "tmp/main"
  
  # Customize binary execution with arguments
  args_bin = ["-port=8080"]
  
  # Watch these filename extensions
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
  
  # Exclude these filename extensions or directories
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "build", ".git", "node_modules"]
  
  # Exclude files
  exclude_file = []
  
  # Exclude unchanged files
  exclude_unchanged = false
  
  # Follow symlink for directories
  follow_symlink = false
  
  # This log file places in your tmp_dir
  log = "errors.log"
  
  # Poll files for changes instead of using fsnotify
  poll = false
  
  # Poll interval (defaults to the minimum interval of 500ms)
  poll_interval = 500
  
  # Delay after receiving an event before reloading
  delay = 1000
  
  # Stop running old binary when build errors occur
  stop_on_error = true
  
  # Send Interrupt signal before killing process (windows does not support this feature)
  send_interrupt = true
  
  # Delay after sending Interrupt signal
  kill_delay = "0s"

[log]
  # Show log time
  time = true

[color]
  # Customize each part's color. If no color found, use the raw app log.
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true

[[build.pre_cmd]]
# Commands to run before building
# cmd = "echo 'Building Go Crypto API...'"

[[build.post_cmd]]
# Commands to run after building
# cmd = "echo 'API server reloaded!'"
