binance:
  base_url: "https://api.binance.com"
  futures_base_url: "https://fapi.binance.com"
  websocket_url: "wss://stream.binance.com:9443/ws"
  futures_websocket_url: "wss://fstream.binance.com/ws"
  timeout: 30
  rate_limit: 1200
  futures_symbols:
    - "XAUUSDT"
    - "XAGUSDT"

symbols:
  - "BTCUSDT"
  - "ETHUSDT"
  - "BNBUSDT"
  - "ADAUSDT"
  - "SOLUSDT"
  - "XAUTUSDT"
  - "XAUUSDT"
  - "XAGUSDT"

intervals:
  - "15m"
  - "1h"
  - "4h"
  - "1d"

indicators:
  rsi:
    periods: [6, 12, 24]
  ma:
    periods: [7, 20, 25, 50, 99, 200]
    type: "SMA" # SMA, EMA, WMA
  kdj:
    k_period: 9
    d_period: 3
    j_period: 3

logging:
  level: "info"
  format: "json"
  output: "stdout"
