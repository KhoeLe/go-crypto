# Ultra-Cheap Serverless Lambda Configuration
# Optimized for AWS Lambda + API Gateway deployment

binance:
  base_url: "https://api.binance.com"
  futures_base_url: "https://fapi.binance.com"
  websocket_url: "wss://stream.binance.com:9443"
  futures_websocket_url: "wss://fstream.binance.com/ws"
  timeout: 30
  rate_limit: 1200 # requests per minute
  futures_symbols:
    - "XAUUSDT"
    - "XAGUSDT"

symbols:
  - "BTCUSDT"
  - "ETHUSDT"
  - "BNBUSDT"
  - "ADAUSDT"
  - "DOTUSDT"
  - "XAUTUSDT"
  - "XAUUSDT"
  - "XAGUSDT"

intervals:
  - "15m"
  - "1h"
  - "4h"
  - "1d"

indicators:
  rsi:
    periods: [6, 12, 24]
  ma:
    periods: [7, 20, 25, 50, 99, 200]
  kdj:
    k_period: 9
    d_period: 3
    j_period: 3

logging:
  level: "info"
  format: "json"

# Lambda-specific optimizations
lambda:
  memory_size: 128 # MB - cheapest option
  timeout: 30 # seconds
  cold_start_optimization: true

# API Gateway settings
api_gateway:
  cors_enabled: true
  throttling:
    burst_limit: 5000
    rate_limit: 2000
