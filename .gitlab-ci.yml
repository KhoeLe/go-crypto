# GitLab CI/CD Pipeline for Go Crypto API - Serverless Lambda Deployment
# Ultra-cheap serverless deployment with AWS Lambda + API Gateway

stages:
  - test
  - build
  - deploy

variables:
  # AWS Configuration (set these in GitLab CI/CD Variables)
  AWS_DEFAULT_REGION: us-east-1
  LAMBDA_FUNCTION_NAME: go-crypto-api
  API_GATEWAY_NAME: go-crypto-api-gateway

# Test stage
test:
  stage: test
  image: golang:1.21-alpine
  script:
    - apk add --no-cache git
    - go mod download
    - go test ./...
    - go vet ./...
  only:
    - main
    - merge_requests

# Build Lambda deployment package
build:
  stage: build
  image: golang:1.21-alpine
  script:
    - apk add --no-cache git zip
    - echo "Building Lambda function..."
    - GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o bootstrap cmd/lambda/main.go
    - zip lambda-deployment.zip bootstrap
    - echo "Lambda package built successfully"
  artifacts:
    paths:
      - lambda-deployment.zip
    expire_in: 1 hour
  only:
    - main

# Deploy to AWS Lambda
deploy:
  stage: deploy
  image: amazon/aws-cli:latest
  dependencies:
    - build
  script:
    - echo "Deploying to AWS Lambda..."
    # Update Lambda function code
    - |
      aws lambda update-function-code \
        --function-name $LAMBDA_FUNCTION_NAME \
        --zip-file fileb://lambda-deployment.zip \
        --region $AWS_DEFAULT_REGION
    # Wait for update to complete
    - |
      aws lambda wait function-updated \
        --function-name $LAMBDA_FUNCTION_NAME \
        --region $AWS_DEFAULT_REGION
    - echo "Lambda function updated successfully!"
    # Get API Gateway URL
    - |
      API_ID=$(aws apigatewayv2 get-apis --query "Items[?Name=='$API_GATEWAY_NAME'].ApiId" --output text --region $AWS_DEFAULT_REGION)
      if [ "$API_ID" != "None" ] && [ "$API_ID" != "" ]; then
        echo "API Gateway URL: https://$API_ID.execute-api.$AWS_DEFAULT_REGION.amazonaws.com/"
      else
        echo "API Gateway not found. Run setup script first."
      fi
  only:
    - main
  environment:
    name: production
    url: https://$API_GATEWAY_ID.execute-api.$AWS_DEFAULT_REGION.amazonaws.com
